services:
  # FastAPI Backend
  - type: web
    name: roboalgo-api
    env: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: postgres_db
          property: connectionString
    disk:
      name: data
      mountPath: /data
      sizeGB: 10

  # React Frontend
  - type: static_site
    name: roboalgo-web
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - path: /*
        destination: /index.html

  # PostgreSQL Database
  - type: pserv
    name: postgres_db
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all

envVars:
  - key: VITE_API_BASE_URL
    value: https://roboalgo-api.onrender.com
